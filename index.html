<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Ana Cañete" />
    <meta
      name="description"
      content="Tienda de anime, con productos de merchandising, figuras de acción, ropa y accesorios relacionados con el anime."
    />
    <meta
      name="keywords"
      content="HTML, CSS, JavaScript, tienda de anime, merchandising, figuras de acción, ropa de anime"
    />
    <!--CSS-->
    <link rel="stylesheet" href="/src/css/main.css" />
    <!--BOOTSTRAP ICONS-->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <!--Title-->
    <title>Anime Shop</title>
  </head>
  <body>
    <div class="container">
      <aside>
        <header>
          <h1 class="logo">AraraShop</h1>
        </header>
        <nav>
          <ul>
            <li>
              <button class="btn btn-productos">Todos los Productos</button>
            </li>
            <li>
              <button class="btn btn-figuras">Figuras</button>
            </li>
            <li>
              <button class="btn btn-accesorios">Accesorios</button>
            </li>
            <li>
              <button class="btn btn-ropas">Ropas</button>
            </li>
            <li>
              <a class="btn btn-menu" href="/carrito.html"><i class="bi bi-bag-fill"></i>Carrito <span class="numero-producto">0</span></a>
            </li>
          </ul>
        </nav>
        <footer>
          <p class="text-footer">© 2026 Annx. Todos los derechos reservados.</p>
        </footer>
      </aside>
      <main>
        <h2 class="titulo-principal">Todos los Productos</h2>
        <div class="contenedor-productos">
          <div class="producto">
            <img class="producto-imagen" src="/src/img/figuras/1.jpeg" alt="">
            <div class="producto-detalles">
              <h3 class="producto-titulo">Figura 1</h3>
              <p class="producto-precio">$19.99</p>
              <button class="producto-agregar">Agregar</button>
            </div>
          </div>
                 <div class="producto">
            <img class="producto-imagen" src="/src/img/figuras/2.jpeg" alt="">
            <div class="producto-detalles">
              <h3 class="producto-titulo">Figura 2</h3>
              <p class="producto-precio">$19.99</p>
              <button class="producto-agregar">Agregar</button>
            </div>
          </div>
                 <div class="producto">
            <img class="producto-imagen" src="/src/img/figuras/3.jpeg" alt="">
            <div class="producto-detalles">
              <h3 class="producto-titulo">Figura 3</h3>
              <p class="producto-precio">$19.99</p>
              <button class="producto-agregar">Agregar</button>
            </div>
          </div>
                 <div class="producto">
            <img class="producto-imagen" src="/src/img/figuras/4.jpeg" alt="">
            <div class="producto-detalles">
              <h3 class="producto-titulo">Figura 4</h3>
              <p class="producto-precio">$19.99</p>
              <button class="producto-agregar">Agregar</button>
            </div>
          </div>
        </div>
      </main>
    </div>

    <script src="/src/js/main.js"></script>
  </body>
</html>
