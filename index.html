<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Ana Cañete" />
    <meta
      name="description"
      content="Tienda de anime, con productos de merchandising, figuras de acción, ropa y accesorios relacionados con el anime."
    />
    <meta
      name="keywords"
      content="HTML, CSS, JavaScript, tienda de anime, merchandising, figuras de acción, ropa de anime"
    />
    <!--CSS-->
    <link rel="stylesheet" href="/src/css/main.css" />
    <!--BOOTSTRAP ICONS-->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
    <!--Title-->
    <title>Anime Shop</title>
  </head>
  <body>
    <div class="container">
      <aside>
        <header>
          <h1 class="logo">AraraShop</h1>
        </header>
        <nav>
          <ul class="menu">
            <li>
              <button class="btn btn-productos active">
                <i class="bi bi-arrow-right-short"></i>Todos los Productos
              </button>
            </li>
            <li>
              <button class="btn btn-figuras">
                <i class="bi bi-arrow-right-short"></i> Figuras
              </button>
            </li>
            <li>
              <button class="btn btn-accesorios">
                <i class="bi bi-arrow-right-short"></i> Accesorios
              </button>
            </li>
            <li>
              <button class="btn btn-ropas">
                <i class="bi bi-arrow-right-short"></i> Ropas
              </button>
            </li>
            <li>
              <a class="btn btn-carrito " href="/carrito.html"
                ><i class="bi bi-bag-fill"></i>Carrito
                <span class="numero-producto">0</span></a
              >
            </li>
          </ul>
        </nav>
        <footer>
          <p class="text-footer">© 2026 Annx. Todos los derechos reservados.</p>
        </footer>
      </aside>
      <main>
        <h2 class="titulo-principal">Todos los Productos</h2>
        <div id="contenedor_productos" class="contenedor-productos">
      <!--Se rellena con js-->
        </div>
      </main>
    </div>

    <script type="module" src="/src/js/main.js"></script>
  </body>
</html>
